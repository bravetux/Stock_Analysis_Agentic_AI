# =============================================================================
# Financial News Sources Configuration
# Author : B.Vignesh Kumar aka Bravetux <ic19939@gmail.com>
# Date   : 10 April 2026
# =============================================================================
#
# Add or remove news sources here. The system uses these for:
#   1. Location-specific news search (site:domain queries via Google News)
#   2. Location-specific search query templates in the 100-query batch
#
# Fields:
#   name     - Display name of the source
#   domain   - Website domain (used in "site:domain" Google search)
#   category - One of: general, analysis, data, regulatory, community
#   enabled  - true/false to toggle without deleting
#
# To add a new source, copy an existing entry and modify it.
# Sources are searched in the order listed here.
# =============================================================================

