services:
  stock-agent:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./.sessions:/app/.sessions
      - ./stocks.txt:/app/stocks.txt:ro
    restart: unless-stopped
